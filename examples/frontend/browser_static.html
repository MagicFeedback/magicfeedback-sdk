    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #f8fafc;
            font-family: "Nunito", "Quicksand", "Avenir Next", "Trebuchet MS", sans-serif;
            color: #1e293b;
        }
        .page-shell {
            max-width: 980px;
            margin: 0 auto;
        }
        .demo-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .demo-tab {
            border: 2px solid #e2e8f0;
            background: #fff;
            border-radius: 9999px;
            padding: 8px 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .demo-tab.active {
            border-color: #1e293b;
            background: #1e293b;
            color: #fff;
        }
        .demo-panel {
            display: none;
        }
        .demo-panel.active {
            display: block;
        }
        .demo-card {
            margin-top: 16px;
            text-align: left;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
        }
        .demo-section-title {
            font-size: 12px;
            color: #64748b;
            margin: 8px 0 16px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .demo-column {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .magicfeedback-preview-question {
            padding: 8px;
        }
    </style>
</head>

<script src="../../dist/magicfeedback-sdk.browser.js"></script>
<script>
    let total = 0;
    window.magicfeedback.init({
        debug: true,
        env: "dev"
    });

    // Create the form
    let form = window.magicfeedback.form(
        "6bd55360-05b8-11f1-92f1-6fb9eeaac119",
        "0110654ec2f9f6d1deb0535558634335"
    );

    // Generate form
    form.generate(
        "demo_form_div", {
            addButton: true,
            addSuccessScreen: true,
            sendButtonText: "Send my friend",
            beforeSubmitEvent: function (response) {
                console.log("BEFORE")
            },
            afterSubmitEvent: function (response) {
                console.log("AFTER", response);
                total = response.total;
                if (response.error) alert(response.error);
            },
            onLoadedEvent: function (response) {
                console.log("LOADED", response);
                total = response.total;
            },
            onBackEvent: function (response) {
                console.log("BACK", response);
            },
        }
    );
</script>

            document.querySelectorAll(".demo-tab").forEach((t) => t.classList.remove("active"));

            const key = tab.getAttribute("data-tab");
            document.querySelectorAll(".demo-panel").forEach((p) => p.classList.remove("active"));
